name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: PrimeNumberCheck
      id: primenumbercheck
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: PrimeNumberCheck
        setup-command: ''
        command: node Prime.js
        input: '5'
        expected-output: Prime Number
        comparison-method: contains
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        PRIMENUMBERCHECK_RESULTS: "${{steps.primenumbercheck.outputs.result}}"
      with:
        runners: primenumbercheck
